<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語思 CALC - SpeakOut Unit 8</title>
    <style>
        :root {
            --primary-blue: #1e2a47;
            --accent-gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #e6c96a, #d4af37);
            --bg-main: #f4f7f9;
            --bg-card: #ffffff;
            --text-dark: #333333;
        }

        body {
            font-family: 'PingFang TC', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .unit-nav {
            background-color: var(--primary-blue);
            width: 100%;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .unit-btn {
            background: transparent;
            color: white;
            border: 1px solid var(--accent-gold);
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .unit-btn.active {
            background: var(--gold-gradient);
            color: var(--primary-blue);
            font-weight: bold;
            border: none;
        }
        .unit-btn.locked {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #555;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--bg-card);
            margin: 30px 0;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 10px solid var(--primary-blue);
        }

        .mibi-box { height: 160px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; }
        .mibi-box img { height: 100%; object-fit: contain; }

        .keyword-tag {
            background: #f0f0f0;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 1rem;
            color: var(--primary-blue);
            font-weight: bold;
            border: 1px solid #ddd;
        }

        .question-zh {
            font-size: 1.4rem;
            color: var(--primary-blue);
            font-weight: bold;
            margin: 20px 0;
            line-height: 1.6;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answer-en {
            font-size: 1.3rem;
            color: var(--accent-gold);
            font-weight: 600;
            margin-bottom: 25px;
            opacity: 0;
            transition: 0.4s;
            min-height: 60px;
        }

        .answer-en.visible { opacity: 1; }

        .btn-group { display: flex; gap: 15px; justify-content: center; }
        button.main-btn {
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-show { background-color: var(--primary-blue); color: white; }
        .btn-next { background: var(--gold-gradient); color: var(--primary-blue); }

        .progress-bar { margin-top: 20px; font-size: 0.85rem; color: #bbb; }
    </style>
</head>
<body>

    <div class="unit-nav">
        <button class="unit-btn" onclick="window.location.href='unit1.html'">Unit 1</button>
        <button class="unit-btn" onclick="window.location.href='unit2.html'">Unit 2</button>
        <button class="unit-btn" onclick="window.location.href='unit3.html'">Unit 3</button>
        <button class="unit-btn" onclick="window.location.href='unit4.html'">Unit 4</button>
        <button class="unit-btn" onclick="window.location.href='unit5.html'">Unit 5</button>
        <button class="unit-btn" onclick="window.location.href='unit6.html'">Unit 6</button>
        <button class="unit-btn" onclick="window.location.href='unit7.html'">Unit 7</button>
        <button class="unit-btn active">Unit 8</button>
        <button class="unit-btn locked" disabled>Unit 9</button>
        <button class="unit-btn locked" disabled>Unit 10</button>
        <button class="unit-btn locked" disabled>Unit 11</button>
        <button class="unit-btn locked" disabled>Unit 12</button>
    </div>

    <div class="container">
        <div style="color: var(--accent-gold); font-weight: bold; margin-bottom: 10px;">Mastering TOEIC Skills: Unit 8</div>
        <div class="mibi-box">
            <img id="mibi-img" src="mibi_hello.jpg" alt="Mibi">
        </div>
        <span id="keyword" class="keyword-tag">關鍵單字</span>
        <div id="q-zh" class="question-zh">載入中...</div>
        <div id="a-en" class="answer-en">Answer</div>
        <div class="btn-group">
            <button class="main-btn btn-show" onclick="showAnswer()">看答案 &amp; 聽發音</button>
            <button class="main-btn btn-next" onclick="nextQuestion()">下一題</button>
        </div>
        <div id="progress" class="progress-bar">1 / 20</div>
    </div>

<script>
    const questions = [
        // --- 核心對話練習 (1-9) ---
        {
            key: "vice president / partnership / booming",
            zh: "副總裁宣佈與供應商的合夥關係正在蓬勃發展，整個季度的營收都創下新高。",
            en: "The vice president announced that the partnership with the supplier was booming, with revenues setting new highs throughout the quarter."
        },
        {
            key: "commission / quarter / bonus",
            zh: "業務團隊在這個季度的佣金與獎金都顯著增加，因為他們達成了所有銷售目標。",
            en: "The sales team saw significant increases in their commission and bonus this quarter because they hit every sales target."
        },
        {
            key: "sole / sluggish / cooperative",
            zh: "在經歷一個遲緩的季度後，這位獨資經營者決定尋找合作的夥伴一起拓展市場。",
            en: "After a sluggish quarter, the sole proprietor decided to find a cooperative partner to expand into new markets together."
        },
        {
            key: "register / oversee / auditing",
            zh: "新登記的合夥企業聘請了一位資深會計師來監督整年度的審計流程，確保財務透明。",
            en: "The newly registered partnership hired a senior accountant to oversee the entire year auditing process and ensure financial transparency."
        },
        {
            key: "cc / subscribe / temporary",
            zh: "請把我加進副本，並訂閱這份臨時公告，這樣大家就能及時掌握最新的政策變動。",
            en: "Please cc me on the thread and subscribe to this temporary bulletin so everyone can stay updated on the latest policy changes."
        },
        {
            key: "tactic / boom / temporary",
            zh: "公司採取新的行銷策略，希望在市場景氣大好時抓住這波短暫的繁榮機會。",
            en: "The company adopted a new marketing tactic, hoping to seize this temporary boom in the market while conditions remained favorable."
        },
        {
            key: "discrimination / dining facility",
            zh: "新落成的員工餐飲設施對所有部門開放，公司同時重申堅決反對任何形式的歧視。",
            en: "The newly opened employee dining facility is accessible to all departments, and the company firmly reiterated its zero-tolerance stance on any discrimination."
        },
        {
            key: "bring forward / quarter / bonus",
            zh: "由於業績亮眼，董事會決定把年終獎金發放日提前一整個季度，以鼓舞士氣。",
            en: "Given the outstanding performance, the board decided to bring forward the year-end bonus payout by a full quarter to boost morale."
        },
        {
            key: "auditing / commission / partnership",
            zh: "獨立的審計確認所有佣金的計算都正確無誤，這加強了合夥人之間的相互信任。",
            en: "The independent auditing confirmed that all commission calculations were accurate, which strengthened mutual trust among the partnership members."
        },
        // --- 字彙對齊強化練習 (10-20) ---
        {
            key: "booming",
            zh: "在電子商務蓬勃發展的時代，傳統零售商必須快速調整策略才能跟上市場步伐。",
            en: "In an era of booming e-commerce, traditional retailers must adapt their strategies quickly to keep pace with the market."
        },
        {
            key: "sluggish",
            zh: "經濟成長變得遲緩之後，公司主管不得不重新審視所有的擴張計畫並調整預算。",
            en: "After economic growth turned sluggish, company executives had to revisit all expansion plans and adjust budgets carefully."
        },
        {
            key: "oversee",
            zh: "新任副總裁將監督整個併購流程，並確保每個環節都符合公司內部的合規標準。",
            en: "The newly appointed vice president will oversee the entire merger process and ensure every step complies with internal company standards."
        },
        {
            key: "auditing",
            zh: "每年的審計流程不僅檢視財報，也評估內部控制是否能有效防範各種風險。",
            en: "The annual auditing process not only reviews financial reports but also evaluates whether internal controls effectively mitigate various risks."
        },
        {
            key: "tactic",
            zh: "面對競爭對手的價格戰，行銷部門必須提出更有創意的策略才能維持市佔率。",
            en: "Facing the competitor price war, the marketing department must propose a more creative tactic to maintain market share."
        },
        {
            key: "sole",
            zh: "作為這家咖啡品牌的獨資經營者，她對所有業務決策都負完全責任，包括人力與財務。",
            en: "As the sole proprietor of this coffee brand, she takes full responsibility for all business decisions, including staffing and finances."
        },
        {
            key: "commission",
            zh: "高佣金的激勵方案吸引了許多頂尖業務員加入公司，但同時也帶來成本管理的挑戰。",
            en: "The high commission incentive scheme attracted many top sales reps to join the company, but also brought cost management challenges."
        },
        {
            key: "bonus",
            zh: "年終獎金的發放金額會根據個人績效以及整體公司獲利狀況做雙重考量與調整。",
            en: "The year-end bonus amount is adjusted based on both individual performance and overall company profitability."
        },
        {
            key: "subscribe",
            zh: "建議大家訂閱財經分析師的每週通訊，可以協助你掌握市場趨勢與投資時機。",
            en: "I recommend subscribing to the financial analyst weekly newsletter; it helps you stay on top of market trends and investment timing."
        },
        {
            key: "discrimination",
            zh: "公司明文禁止任何基於年齡、性別或國籍的歧視，並設有專責部門處理相關申訴。",
            en: "The company strictly prohibits any discrimination based on age, gender, or nationality, with a dedicated department handling related complaints."
        },
        {
            key: "bring forward",
            zh: "由於客戶要求變動，專案經理決定把產品發表會的時程提前兩週進行。",
            en: "Due to a client request change, the project manager decided to bring forward the product launch by two weeks."
        }
    ];

    let currentIndex = 0;
    const synth = window.speechSynthesis;

    function updateDisplay() {
        const q = questions[currentIndex];
        document.getElementById('keyword').innerText = "關鍵字: " + q.key;
        document.getElementById('q-zh').innerText = q.zh;
        document.getElementById('a-en').innerText = q.en;
        document.getElementById('a-en').classList.remove('visible');
        document.getElementById('progress').innerText = (currentIndex + 1) + " / " + questions.length;
        document.getElementById('mibi-img').src = 'mibi_cheer.jpg';
    }

    function showAnswer() {
        const q = questions[currentIndex];
        document.getElementById('a-en').classList.add('visible');
        document.getElementById('mibi-img').src = 'mibi_speak.jpg';
        if (synth.speaking) synth.cancel();
        const utter = new SpeechSynthesisUtterance(q.en);
        utter.lang = 'en-US';
        utter.rate = 0.85;
        synth.speak(utter);
    }

    function nextQuestion() {
        if (synth.speaking) synth.cancel();
        currentIndex = (currentIndex + 1) % questions.length;
        updateDisplay();
    }

    updateDisplay();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語思 CALC - SpeakOut Unit 5</title>
    <style>
        :root {
            --primary-blue: #1e2a47;
            --accent-gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #e6c96a, #d4af37);
            --bg-main: #f4f7f9;
            --bg-card: #ffffff;
            --text-dark: #333333;
        }

        body {
            font-family: 'PingFang TC', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .unit-nav {
            background-color: var(--primary-blue);
            width: 100%;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .unit-btn {
            background: transparent;
            color: white;
            border: 1px solid var(--accent-gold);
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .unit-btn.active {
            background: var(--gold-gradient);
            color: var(--primary-blue);
            font-weight: bold;
            border: none;
        }
        .unit-btn.locked {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #555;
        }


        .container {
            width: 90%;
            max-width: 600px;
            background: var(--bg-card);
            margin: 30px 0;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 10px solid var(--primary-blue);
        }

        .mibi-box { height: 160px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; }
        .mibi-box img { height: 100%; object-fit: contain; }

        .keyword-tag {
            background: #f0f0f0;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 1rem;
            color: var(--primary-blue);
            font-weight: bold;
            border: 1px solid #ddd;
        }

        .question-zh {
            font-size: 1.4rem;
            color: var(--primary-blue);
            font-weight: bold;
            margin: 20px 0;
            line-height: 1.6;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answer-en {
            font-size: 1.3rem;
            color: var(--accent-gold);
            font-weight: 600;
            margin-bottom: 25px;
            opacity: 0;
            transition: 0.4s;
            min-height: 60px;
        }

        .answer-en.visible { opacity: 1; }

        .btn-group { display: flex; gap: 15px; justify-content: center; }
        button.main-btn {
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-show { background-color: var(--primary-blue); color: white; }
        .btn-next { background: var(--gold-gradient); color: var(--primary-blue); }

        .progress-bar { margin-top: 20px; font-size: 0.85rem; color: #bbb; }
    </style>
</head>
<body>

        <div class="unit-nav">
        <button class="unit-btn" onclick="window.location.href='unit1.html'">Unit 1</button>
        <button class="unit-btn" onclick="window.location.href='unit2.html'">Unit 2</button>
        <button class="unit-btn" onclick="window.location.href='unit3.html'">Unit 3</button>
        <button class="unit-btn" onclick="window.location.href='unit4.html'">Unit 4</button>
        <button class="unit-btn active">Unit 5</button>
        <button class="unit-btn" onclick="window.location.href='unit6.html'">Unit 6</button>
        <button class="unit-btn" onclick="window.location.href='unit7.html'">Unit 7</button>
        <button class="unit-btn" onclick="window.location.href='unit8.html'">Unit 8</button>
        <button class="unit-btn" onclick="window.location.href='unit9.html'">Unit 9</button>
        <button class="unit-btn locked" disabled>Unit 10</button>
        <button class="unit-btn locked" disabled>Unit 11</button>
        <button class="unit-btn locked" disabled>Unit 12</button>
    </div>

    <div class="container">
        <div style="color: var(--accent-gold); font-weight: bold; margin-bottom: 10px;">Mastering TOEIC Skills: Unit 5</div>
        <div class="mibi-box">
            <img id="mibi-img" src="mibi_hello.jpg" alt="Mibi">
        </div>
        <span id="keyword" class="keyword-tag">關鍵單字</span>
        <div id="q-zh" class="question-zh">載入中...</div>
        <div id="a-en" class="answer-en">Answer</div>
        <div class="btn-group">
            <button class="main-btn btn-show" onclick="showAnswer()">看答案 & 聽發音</button>
            <button class="main-btn btn-next" onclick="nextQuestion()">下一題</button>
        </div>
        <div id="progress" class="progress-bar">1 / 20</div>
    </div>

<script>
    const questions = [
        // --- 核心對話練習 (市場研究與行銷情境) ---
        { key: "market research / statistics / segment", zh: "Olivia，最新的市場研究結果出來了，統計數據顯示我們在 25 到 34 歲的市場區隔需求大幅成長。", en: "Olivia, the latest market research is out, and the statistics show that consumer demand has grown significantly in our 25-to-34-year-old segment." },
        { key: "demographics / buying behavior / questionnaire", zh: "我們在問卷裡新增了三題，發現他們的人口統計和購買行為跟去年完全不同。", en: "We added three questions to the questionnaire and found that their demographics and buying behavior are completely different from last year." },
        { key: "focus group / brand awareness / convenience", zh: "兩場焦點團體訪談都顯示，這群消費者特別重視便利性和品牌知名度。", en: "Two focus groups both showed that these consumers care a lot about convenience and brand awareness." },
        { key: "cold calls / unethical / campaign", zh: "我們應該停掉那些被認為不道德的陌生開發電話，改用更精準的行銷活動。", en: "We should stop the cold calls that are seen as unethical and shift to more targeted campaigns." },
        { key: "customize / promote / brick-and-mortar", zh: "我建議用客製化的內容去推廣這條新產品線，並用實體店面體驗來補強。", en: "I suggest customizing the content to promote the new product line and reinforcing it with brick-and-mortar experiences." },
        { key: "competition / competitor / advertising / outweigh", zh: "競爭越來越激烈，主要競爭者已經在電視廣告加碼，但我們相信數位通路的長期效益會超過電視廣告。", en: "Competition is intensifying and our main competitor has doubled down on TV advertising, but we believe digital channels will outweigh TV advertising in the long run." },
        { key: "joint venture / infrastructure / implement", zh: "我提議和當地零售商合作一個合資企業，因為中部市場的零售基礎建設還很弱，這樣才能更快推行新策略。", en: "I propose forming a joint venture with a local retailer because the retail infrastructure in the central region is weak, which will help us implement the new strategy faster." },
        { key: "incentives / quota / GDP", zh: "我們可以設小額誘因鼓勵消費者填問卷，再依過去三季的銷售配額和 GDP 預測來定基準。", en: "We can offer small incentives to encourage consumers to fill out the questionnaire, then set the baseline using last three quarters' sales quota and the GDP forecast." },
        { key: "boost / accrue / dip / analyze", zh: "由於利息持續累積，我們的行銷準備金還有空間，可以撥一部分提升品牌力，並重新分析上一季客戶下滑的原因。", en: "Since interest continues to accrue, our marketing reserve still has room to boost brand power, and we can re-analyze the reasons behind last quarter's customer dip." },

        // --- 字彙對齊強化練習 ---
        { key: "market research", zh: "我們在進入新市場前都會先做市場研究。", en: "We always conduct market research before entering a new market." },
        { key: "demographics", zh: "這個產品的目標人口統計族群是專業女性。", en: "This product's target demographics are professional women." },
        { key: "segment", zh: "高端市場區隔的成長速度最快。", en: "The premium segment is growing the fastest." },
        { key: "questionnaire", zh: "請花兩分鐘填寫這份問卷。", en: "Please take two minutes to fill out this questionnaire." },
        { key: "focus group", zh: "焦點團體在週四下午舉行。", en: "The focus group is scheduled for Thursday afternoon." },
        { key: "brand awareness", zh: "我們的目標是把品牌知名度提升 20%。", en: "Our goal is to raise brand awareness by 20%." },
        { key: "buying behavior", zh: "疫情之後消費者的購買行為改變很多。", en: "Consumer buying behavior has changed significantly after the pandemic." },
        { key: "joint venture", zh: "雙方上週簽下了合資企業協議。", en: "Both parties signed the joint venture agreement last week." },
        { key: "implement", zh: "管理層決定下個月推行新政策。", en: "Management decided to implement the new policy next month." },
        { key: "outweigh", zh: "這項投資的好處遠大於風險。", en: "The benefits of this investment far outweigh the risks." },
        { key: "accrue", zh: "這筆基金的利息每天都會累積。", en: "Interest on this fund accrues daily." }
    ];

    let currentIndex = 0;
    const synth = window.speechSynthesis;

    function updateDisplay() {
        const q = questions[currentIndex];
        document.getElementById('keyword').innerText = "關鍵字: " + q.key;
        document.getElementById('q-zh').innerText = q.zh;
        document.getElementById('a-en').innerText = q.en;
        document.getElementById('a-en').classList.remove('visible');
        document.getElementById('progress').innerText = `${currentIndex + 1} / ${questions.length}`;
        document.getElementById('mibi-img').src = 'mibi_cheer.jpg';
    }

    function showAnswer() {
        document.getElementById('a-en').classList.add('visible');
        document.getElementById('mibi-img').src = 'mibi_happy.jpg';
        const utter = new SpeechSynthesisUtterance(questions[currentIndex].en);
        utter.lang = 'en-US';
        utter.rate = 0.85;
        synth.speak(utter);
    }

    function nextQuestion() {
        currentIndex = (currentIndex + 1) % questions.length;
        updateDisplay();
    }

    window.onload = updateDisplay;
</script>
</body>
</html>

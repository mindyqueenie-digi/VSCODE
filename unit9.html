<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語思 CALC - SpeakOut Unit 9</title>
    <style>
        :root {
            --primary-blue: #1e2a47;
            --accent-gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #e6c96a, #d4af37);
            --bg-main: #f4f7f9;
            --bg-card: #ffffff;
            --text-dark: #333333;
        }

        body {
            font-family: 'PingFang TC', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .unit-nav {
            background-color: var(--primary-blue);
            width: 100%;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .unit-btn {
            background: transparent;
            color: white;
            border: 1px solid var(--accent-gold);
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .unit-btn.active {
            background: var(--gold-gradient);
            color: var(--primary-blue);
            font-weight: bold;
            border: none;
        }
        .unit-btn.locked {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #555;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--bg-card);
            margin: 30px 0;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 10px solid var(--primary-blue);
        }

        .mibi-box { height: 160px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; }
        .mibi-box img { height: 100%; object-fit: contain; }

        .keyword-tag {
            background: #f0f0f0;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 1rem;
            color: var(--primary-blue);
            font-weight: bold;
            border: 1px solid #ddd;
        }

        .question-zh {
            font-size: 1.4rem;
            color: var(--primary-blue);
            font-weight: bold;
            margin: 20px 0;
            line-height: 1.6;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answer-en {
            font-size: 1.3rem;
            color: var(--accent-gold);
            font-weight: 600;
            margin-bottom: 25px;
            opacity: 0;
            transition: 0.4s;
            min-height: 60px;
        }

        .answer-en.visible { opacity: 1; }

        .btn-group { display: flex; gap: 15px; justify-content: center; }
        button.main-btn {
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-show { background-color: var(--primary-blue); color: white; }
        .btn-next { background: var(--gold-gradient); color: var(--primary-blue); }

        .progress-bar { margin-top: 20px; font-size: 0.85rem; color: #bbb; }
    </style>
</head>
<body>

        <div class="unit-nav">
        <button class="unit-btn" onclick="window.location.href='unit1.html'">Unit 1</button>
        <button class="unit-btn" onclick="window.location.href='unit2.html'">Unit 2</button>
        <button class="unit-btn" onclick="window.location.href='unit3.html'">Unit 3</button>
        <button class="unit-btn" onclick="window.location.href='unit4.html'">Unit 4</button>
        <button class="unit-btn" onclick="window.location.href='unit5.html'">Unit 5</button>
        <button class="unit-btn" onclick="window.location.href='unit6.html'">Unit 6</button>
        <button class="unit-btn" onclick="window.location.href='unit7.html'">Unit 7</button>
        <button class="unit-btn" onclick="window.location.href='unit8.html'">Unit 8</button>
        <button class="unit-btn active">Unit 9</button>
        <button class="unit-btn locked" disabled>Unit 10</button>
        <button class="unit-btn locked" disabled>Unit 11</button>
        <button class="unit-btn locked" disabled>Unit 12</button>
    </div>

    <div class="container">
        <div style="color: var(--accent-gold); font-weight: bold; margin-bottom: 10px;">Mastering TOEIC Skills: Unit 9</div>
        <div class="mibi-box">
            <img id="mibi-img" src="mibi_hello.jpg" alt="Mibi">
        </div>
        <span id="keyword" class="keyword-tag">關鍵單字</span>
        <div id="q-zh" class="question-zh">載入中...</div>
        <div id="a-en" class="answer-en">Answer</div>
        <div class="btn-group">
            <button class="main-btn btn-show" onclick="showAnswer()">看答案 &amp; 聽發音</button>
            <button class="main-btn btn-next" onclick="nextQuestion()">下一題</button>
        </div>
        <div id="progress" class="progress-bar">1 / 20</div>
    </div>

<script>
    const questions = [
        // --- 核心對話練習 (1-9) ---
        {
            key: "job fair / recruiter / multinational corporation",
            zh: "在今天的就業博覽會上，這家跨國企業的招募經理親自面試每一位求職者。",
            en: "At today's job fair, the recruiter from the multinational corporation personally interviewed every job seeker."
        },
        {
            key: "CV / cover letter / resume",
            zh: "每位應徵者都必須繳交履歷和一封求職信，連同正式的簡歷一起說明自己的專業資格。",
            en: "Each applicant must submit a CV and a cover letter, along with a formal resume explaining their qualifications."
        },
        {
            key: "overqualified / entry-level / candidate",
            zh: "面試官擔心這位人選對於這個入門級職位來說資歷過高，可能很快就會離職。",
            en: "The interviewer worried that this candidate was overqualified for the entry-level position and might leave soon."
        },
        {
            key: "telecommute / perks",
            zh: "能夠遠距上班是這家公司最吸引人的福利之一，特別受到年輕員工的歡迎。",
            en: "Being able to telecommute is one of the most attractive perks this company offers, especially popular among younger staff."
        },
        {
            key: "compensation / job satisfaction",
            zh: "優渥的薪酬方案加上高度的工作滿意度，讓公司的員工流動率大幅下降。",
            en: "A generous compensation package and high job satisfaction greatly reduced the company's staff turnover."
        },
        {
            key: "freelance / temp / aspire",
            zh: "他做過自由接案的工作，也當過短期的臨時雇員，但他一直立志進入一家大企業發展。",
            en: "He worked as a freelance contractor and a temp, but he always aspired to grow within a large corporation."
        },
        {
            key: "diversity / innovative",
            zh: "公司以重視團隊多元性和鼓勵創新的工作方式自豪，因此能吸引各地的人才。",
            en: "The company prides itself on valuing team diversity and encouraging innovative ways of working, attracting talent from everywhere."
        },
        {
            key: "probationary period / terminated / severance package",
            zh: "即使員工在試用期內被資遣，公司仍會依法提供一份合理的資遣方案。",
            en: "Even if an employee is terminated during the probationary period, the company still provides a fair severance package."
        },
        {
            key: "boast / good with numbers / post-secondary education",
            zh: "她不想自誇，但她擁有完整的高等教育背景，而且非常擅長數字。",
            en: "She doesn't want to boast, but she has a solid post-secondary education and is very good with numbers."
        },
        // --- 字彙對齊強化練習 (10-20) ---
        {
            key: "recipient",
            zh: "這個年度最佳員工獎的得獎者，將獲得一筆額外的獎金與多天的有薪假期。",
            en: "The recipient of this year's best employee award will receive an extra bonus and several paid vacation days."
        },
        {
            key: "underdressed",
            zh: "第一次參加正式面試時，他非常擔心自己今天穿得太過隨便。",
            en: "At his first formal interview, he was very worried about being underdressed today."
        },
        {
            key: "self-esteem",
            zh: "一份穩定的工作和同事真誠的肯定，能大幅提升一個人的自信與自我價值感。",
            en: "A stable job and sincere recognition from colleagues can greatly boost one's self-esteem."
        },
        {
            key: "qualifications",
            zh: "招募人員會仔細檢視每一位應徵者的學歷與專業資格，再決定是否安排面試。",
            en: "Recruiters carefully review each applicant's qualifications before deciding whether to arrange an interview."
        },
        {
            key: "candidate",
            zh: "在所有人選之中，這位求職者的臨場表現與專業態度最為亮眼。",
            en: "Among all the candidates, this job seeker's performance and professionalism stood out the most."
        },
        {
            key: "compensation",
            zh: "具競爭力的薪酬待遇是吸引頂尖人才、並留住他們的關鍵因素之一。",
            en: "A competitive compensation package is one of the key factors in attracting and retaining top talent."
        },
        {
            key: "telecommute",
            zh: "疫情之後，越來越多公司允許員工每週遠距工作幾天，以兼顧效率與生活品質。",
            en: "After the pandemic, more and more companies allow employees to telecommute a few days a week."
        },
        {
            key: "entry-level",
            zh: "這個入門級職位非常適合剛從大學畢業、希望累積經驗的社會新鮮人。",
            en: "This entry-level position is perfect for fresh graduates who want to gain experience."
        },
        {
            key: "perks",
            zh: "除了基本薪水，公司提供的健身房與免費午餐也是很受歡迎的額外福利。",
            en: "Besides the base salary, the gym and free lunch the company offers are popular perks."
        },
        {
            key: "innovative",
            zh: "這家新創公司以創新的產品設計與大膽的行銷手法在業界打響了名號。",
            en: "This startup made a name for itself with its innovative product design and bold marketing."
        },
        {
            key: "recruiter",
            zh: "一位優秀的招募人員，能夠快速判斷哪一位人選最適合公司的文化與團隊。",
            en: "A skilled recruiter can quickly tell which candidate best fits the company's culture and team."
        }
    ];

    let currentIndex = 0;
    const synth = window.speechSynthesis;

    function updateDisplay() {
        const q = questions[currentIndex];
        document.getElementById('keyword').innerText = "關鍵字: " + q.key;
        document.getElementById('q-zh').innerText = q.zh;
        document.getElementById('a-en').innerText = q.en;
        document.getElementById('a-en').classList.remove('visible');
        document.getElementById('progress').innerText = (currentIndex + 1) + " / " + questions.length;
        document.getElementById('mibi-img').src = 'mibi_cheer.jpg';
    }

    function showAnswer() {
        const q = questions[currentIndex];
        document.getElementById('a-en').classList.add('visible');
        document.getElementById('mibi-img').src = 'mibi_speak.jpg';
        if (synth.speaking) synth.cancel();
        const utter = new SpeechSynthesisUtterance(q.en);
        utter.lang = 'en-US';
        utter.rate = 0.85;
        synth.speak(utter);
    }

    function nextQuestion() {
        if (synth.speaking) synth.cancel();
        currentIndex = (currentIndex + 1) % questions.length;
        updateDisplay();
    }

    updateDisplay();
</script>
</body>
</html>
